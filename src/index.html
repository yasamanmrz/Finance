<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="assets/stylesheet/output.css">
  <link rel="stylesheet" href="assets/stylesheet/master.css">
  <link rel="stylesheet" href="assets/icon/font/fontello.ttf">
</head>
<body class="flex flex-col items-center md:container mx-auto bg-gradient-to-br from-slate-950 via-slate-900 to-black text-slate-100">
<!-- //////////////////toasred//////////// -->
  <div id="toast" class="hidden fixed top-5 right-5 bg-emerald-500/90 backdrop-blur-xl text-white px-6 py-3 rounded-2xl shadow-2xl border border-white/10 z-50 animate-bounce"></div>
   <section class="w-full max-w-7xl mx-auto py-10">
    <!-- ////////////////header/////////////// -->
    <div class="border border-white/10 backdrop-blur-xl bg-white/5 rounded-3xl p-6 shadow-2xl mb-10 hover:scale-[1.01] transition-all duration-300">
      <h1 class="font-extrabold text-5xl bg-gradient-to-r from-blue-400 via-cyan-300 to-emerald-400 bg-clip-text text-transparent tracking-wide">Dashboard</h1>
    </div>
    <!-- /////////////dashboard cards//////////////////// -->
   <!-- Dashboard Cards  -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mb-12">
   <!-- //////balance/////// -->
    <div class="group backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-7 shadow-2xl hover:-translate-y-2 hover:shadow-cyan-500/20 transition-all duration-500">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-slate-300 text-xl font-semibold">Balance</h3>
        <div class="w-12 h-12 rounded-2xl bg-cyan-500/20 flex items-center justify-center group-hover:rotate-12 transition duration-500">💰</div>
      </div>
      <p id="dashboard-balance" class="text-2xl font-extrabold text-cyan-300 tracking-wide">0</p>
    </div>
<!-- ///////income///////////// -->
    <div class="group backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-7 shadow-2xl hover:-translate-y-2 hover:shadow-emerald-500/20 transition-all duration-500">

      <div class="flex items-center justify-between mb-4">
        <h3 class="text-slate-300 text-xl font-semibold">Income</h3>
        <div class="w-12 h-12 rounded-2xl bg-emerald-500/20 flex items-center justify-center group-hover:rotate-12 transition duration-500">📈</div>
      </div>
      <p id="dashboard-income" class="text-2xl font-extrabold text-emerald-300 tracking-wide">0</p>

    </div>

   <!-- /////expense/////// -->
    <div
      class="group backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-7 shadow-2xl hover:-translate-y-2 hover:shadow-red-500/20 transition-all duration-500">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-slate-300 text-xl font-semibold">Expense</h3>
        <div class="w-12 h-12 rounded-2xl bg-red-500/20 flex items-center justify-center group-hover:rotate-12 transition duration-500">📉</div>
      </div>
      <p id="dashboard-expense" class="text-2xl font-extrabold text-red-300 tracking-wide">0</p>
    </div>
    <!-- Budget -->
    <div class="group backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-7 shadow-2xl hover:-translate-y-2 hover:shadow-blue-500/20 transition-all duration-500">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-slate-300 text-xl font-semibold">Budget</h3>
        <div class="w-12 h-12 rounded-2xl bg-blue-500/20 flex items-center justify-center group-hover:rotate-12 transition duration-500">🏦</div>
      </div>
      <p id="dashboard-budget" class="text-2xl font-extrabold text-blue-300 tracking-wide">0</p>
    </div>
  </div>    
  <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl px-1 py-8 shadow-2xl">
    <div class="w-full px-14 py-5">
      <h2 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-300 to-blue-500 bg-clip-text text-transparent mb-5">Transaction</h2>    
     <button onclick="openTransactionForm()" class="px-7 py-3 mb-3 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-lg">+ New Transaction</button>
        <div class="container mx-auto w-ful">
          <table class="w-full my-10"> 
            <tbody class="w-2/3" id="transactions-table">
            </tbody>
          </table>
        </div>        
        <div class="backdrop-blur-2xl bg-gradient-to-br from-slate-800 via-slate-700 to-black border-white/10 rounded-3xl p-6 shadow-2xl" id="transaction-form" style="display: none;">
          <div class="mb-4">
            <label class="block mb-1 font-bold text-lg" for="transaction-type">Kind of transaction:</label>
            <select class="border border-cyan-500 rounded-xl p-1" id="transaction-type">
              <option class="px-4 py-1 rounded-full bg-emerald-900/20 text-emerald-950 text-sm font-semibold border border-emerald-400/20" value="income">Income</option>
              <option class="px-4 py-1 rounded-full bg-red-500/20 text-red-950 text-sm font-semibold border border-emerald-400/20" value="expense">Expense</option>
            </select>
          </div>        
          <div class="mb-4">
            <label class="block mb-1 font-bold text-lg" for="transaction-amount">Amount:</label>
            <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" type="number" id="transaction-amount">
          </div>        
          <div class="mb-4">
            <label class="block mb-1 font-bold text-lg" for="transaction-date">Date:</label>
            <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" type="date" id="transaction-date">
          </div>        
          <div class="mb-4">
            <label class="block mb-3 font-bold text-lg" for="transaction-category">Category:</label>
            <select class="border border-cyan-500 rounded-3xl p-1" id="transaction-category">
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="food">Food</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="housing">Housing</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="transportation">Transportation</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="Salary">Salary</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="entertainment">Entertainment</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="health & beauty">Health & Beauty</option>
              <option class="px-4 py-1 rounded-full bg-cyan-950 text-sm font-semibold" value="other">Others</option>
            </select>
          </div>
        
          <div class="mb-4">
            <label class="block mb-1 font-bold text-lg" for="transaction-description">Desc:</label>
            <textarea class="w-full p-2 rounded-xl border border-cyan-500 box-border" id="transaction-description"></textarea>
          </div>
        
          <div class="mb-4">
            <button class="px-4 py-2 mb-3 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-md" id="save-transaction-button" onclick="saveTransaction()">Save</button>
            <button class="px-4 py-2 mb-3 rounded-2xl bg-gradient-to-r from-red-400 to-red-300 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-md" onclick="closeTransactionForm()">Cancel</button>
          </div>
         </div>
        </div>
        
        <div class="w-full px-14 py-5">
          <h2 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-300 to-blue-500 bg-clip-text text-transparent mb-5">Banks</h2>
    
          <button onclick="openBankForm()" class="px-7 py-3 mb-3 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-lg">+ Add Banks</button>
              <div class="container mx-auto w-full">
                <table class="w-full my-10">
                  <tbody class="w-2/3" id="Bank-table">
                  </tbody>
                </table>
              </div>
              
              <div class="backdrop-blur-2xl bg-gradient-to-br from-slate-800 via-slate-700 to-black border-white/10 rounded-3xl p-6 shadow-2xl" id="bank-form" style="display: none;">
                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="bank-type">Bank:</label>
                  <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" type="text" id="bank-type">
                </div>
              
                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="bank-branch">Branch:</label>
                  <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" type="text" id="bank-branch">
                </div>
              
                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="bankcard">Card`s Number:</label>
                  <!-- <input class="w-full p-2 rounded-xl border box-border" type="number" id="bankcard"> -->
                  <div class="num flex gap-2 mb-4 w-full">
                    <input type="text" placeholder="1234" maxlength="4" id="c1" data-type="bankcard" data-next="c2" data-target="CardNum1" class="w-1/4 text-center p-2 rounded-xl border border-cyan-500 box-border">
                    <input type="text" placeholder="5678" maxlength="4" id="c2" data-type="bankcard" data-next="c3" data-prev="c1" data-target="CardNum2" class="w-1/4 text-center p-2 rounded-xl border border-cyan-500 box-border">
                    <input type="text" placeholder="9101" maxlength="4" id="c3" data-type="bankcard" data-next="c4" data-prev="c2" data-target="CardNum3" class="w-1/4 text-center p-2 rounded-xl border border-cyan-500 box-border">
                    <input type="text" placeholder="1123" maxlength="4" id="c4" data-type="bankcard" data-next="Year" data-prev="c3" data-target="CardNum4" class="w-1/4 text-center p-2 rounded-xl border border-cyan-500 box-border">
                </div>
                <input type="hidden" id="bank-card">
                </div>

                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="account">Account Number:</label>
                  <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" id="account">
                </div>
              
                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="bank-description">Desc:</label>
                  <textarea class="w-full p-2 rounded-xl border border-cyan-500 box-border" id="bank-description"></textarea>
                </div>

                <div class="mb-4">
                  <label class="block mb-1 font-bold text-lg" for="money">Money:</label>
                  <input class="w-full p-2 rounded-xl border border-cyan-500 box-border" type="number" id="money">
                </div>
              
                <div class="mb-4">
                  <button class="px-4 py-2 mb-3 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-md" id="save-bank-button" onclick="saveBank()">Save</button>
                  <button class="px-4 py-2 mb-3 rounded-2xl bg-gradient-to-r from-red-400 to-red-300 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-md" onclick="closeBankForm()">Cancel</button>
                </div>
               </div>
              </div>
        </div>
        <!-- /////////////////////////////// -->
        <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl mt-5">
          <div class="px-14 py-5">
            <h2 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-300 to-blue-500 bg-clip-text text-transparent mb-5">Transfer Money</h2>
            <button onclick="openTransferForm()" class="px-7 py-3 mb-3 rounded-2xl bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-lg">+ New Transfer</button>
            <div class="backdrop-blur-2xl bg-gradient-to-br from-slate-800 via-slate-700 to-black border-white/10 rounded-3xl p-6 mt-8 shadow-2xl" id="transfer-form" style="display: none;">
              <div class="mb-4">
               <label class="block mb-1 font-bold text-lg">From Bank :</label>
               <select class="border border-cyan-500 bg-cyan-950 rounded-xl p-1" id="transfer-from"></select>
              </div>
              <div class="mb-4">
               <label class="block mb-1 font-bold text-lg">To Bank :</label>
               <select class="border border-cyan-500 bg-cyan-950 rounded-xl p-1" id="transfer-to"></select>
              </div>
              <div class="mb-4">
               <label class="block mb-1 font-bold text-lg">Amount :</label>
               <input type="number" id="transfer-amount" class="w-full p-2 rounded-xl border border-cyan-500 box-border">
              </div>
              <div class="mb-4">
               <label class="block mb-1 font-bold text-lg">Description :</label>
               <textarea class="w-full p-2 rounded-xl border border-cyan-500 box-border" id="transfer-description"></textarea>
              </div>
             <button onclick="saveTransfer()" class="px-4 py-2 mb-3 rounded-2xl bg-gradient-to-r from-emerald-900 to-emerald-500 hover:scale-105 hover:shadow-2xl hover:shadow-cyan-500/30 transition-all duration-300 font-bold text-md">Transfer</button>
            </div>
          </div>
        </div>
        <!-- //////////footer///////////////// -->
        <div class="backdrop-blur-2xl bg-white/5 border border-white/10 rounded-3xl p-8 shadow-2xl mt-5 flex flex-col md:flex-rpw justify-center md:justify-evenly gap-8 md:gap-0">
          
          <div class="flex flex-col md:flex-row items-center justify-center gap-4 text-center md:text-left">
            <div class="w-28 h-28 sm:w-36 sm:h-36 md:w-40 md:h-40 rounded-full border-2 border-gray-600 overflow-hidden shadow-xl">
              <img src="assets/img/yasi.jpg" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div>
              <h3 class="text-cyan-700 text-xl sm:text-2xl font-bold">Yasaman Mirzaei</h3>
              <p class="text-cyan-800 text-sm md:text-md">Front-end Developer</p>
            </div>
          </div>
          
          <div class="flex flex-col sm:flex-row justify-center sm:justify-between items-center gap-4 sm:gap-3 text-center">
              <span class="text-cyan-700 text-md font-semibold">Connect with me:</span>
              <div class="flex gap-4">
                  <a href="https://www.linkedin.com/in/yasaman-mirzaei-b9499537b" class="social-link group" target="_blank">
                      <div class="w-10 h-10 bg-cyan-950 rounded-xl flex justify-center items-center group-hover:rotate-12 group-hover:bg-cyan-800 transition-all duration-300 hover:-translate-y-1.5">
                          <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" class="w-5 invert opacity-70 group-hover:opacity-100" alt="LinkedIn">
                      </div>
                  </a>
                  <a href="https://github.com/yasamanmrz" class="social-link group" target="_blank">
                      <div class="w-10 h-10 bg-cyan-950 rounded-xl flex justify-center items-center group-hover:rotate-12 group-hover:bg-cyan-800 transition-all duration-300 hover:-translate-y-1.5">
                          <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-5 invert opacity-70 group-hover:opacity-100" alt="GitHub">
                      </div>
                  </a>
                  <a href="https://www.instagram.com/yasaman_dev?igsh=MWZkMGNmazlidTV3cQ==" class="social-link group" target="_blank">
                      <div class="w-10 h-10 bg-cyan-950 rounded-xl flex justify-center items-center group-hover:rotate-12 group-hover:bg-cyan-800 transition-all duration-300 hover:-translate-y-1.5">
                          <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" class="w-5 invert opacity-70 group-hover:opacity-100" alt="Instagram">
                      </div>
                  </a>
              </div>
          </div>
        </div>
      </div>
      
   </section>
</body>
<script src="assets/js/master.js" defer></script>
</html>
